<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="app-wrapper">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">
      <span class="logo-icon">⬢</span>
      <span class="logo-text">TaskFlow</span>
    </div>
    <nav class="nav-filters">
      <button class="nav-btn active" data-filter="all">All Tasks</button>
      <button class="nav-btn" data-filter="todo">To-Do</button>
      <button class="nav-btn" data-filter="inprogress">In Progress</button>
      <button class="nav-btn" data-filter="done">Done</button>
    </nav>
    <div class="sidebar-stats">
      <div class="stat-box"><span class="stat-num" id="stat-total">0</span><span class="stat-label">Total</span></div>
      <div class="stat-box"><span class="stat-num" id="stat-done">0</span><span class="stat-label">Done</span></div>
      <div class="stat-box"><span class="stat-num" id="stat-pending">0</span><span class="stat-label">Pending</span></div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <header class="top-bar">
      <div>
        <h1 class="page-title">My Tasks</h1>
        <p class="page-sub" id="date-display"></p>
      </div>
      <button class="btn-add" id="openModal">+ New Task</button>
    </header>
    <div class="search-wrap">
      <input type="text" id="searchInput" class="search-input" placeholder="Search tasks..."/>
    </div>
    <div class="task-board" id="taskBoard"></div>
    <p class="empty-msg" id="emptyMsg">No tasks yet. Create your first one!</p>
  </main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 class="modal-title" id="modalTitle">New Task</h2>
    <input type="text" id="taskTitle" class="modal-input" placeholder="Task title *" maxlength="80"/>
    <textarea id="taskDesc" class="modal-input modal-textarea" placeholder="Description (optional)"></textarea>
    <div class="modal-row">
      <select id="taskPriority" class="modal-input">
        <option value="low">Low Priority</option>
        <option value="medium" selected>Medium Priority</option>
        <option value="high">High Priority</option>
      </select>
      <select id="taskStatus" class="modal-input">
        <option value="todo">To-Do</option>
        <option value="inprogress">In Progress</option>
        <option value="done">Done</option>
      </select>
    </div>
    <input type="date" id="taskDue" class="modal-input"/>
    <div class="modal-actions">
      <button class="btn-cancel" id="closeModal">Cancel</button>
      <button class="btn-save" id="saveTask">Save Task</button>
    </div>
  </div>
</div>
<script src="js/app.js"></script>
</body>
</html>
